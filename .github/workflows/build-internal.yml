name: Build Internal Test Monitor
on:
  repository_dispatch:
    types: [ core_updated ]
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Test Plugin Zip
        run: zip -r revised-shop-monitor-test.zip . -x "*.git*" "node_modules/*"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: internal-monitor-test
          path: revised-shop-monitor-test.zip
