<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 148 34" role="img" aria-label="Slate">
  <title>Slate</title>
  <!-- Left bracket bar -->
  <rect x="0" y="0" width="6" height="34" fill="#1A2E24"/>
  <!-- Main body: parallelogram with diagonal right edge matching brand shape -->
  <polygon points="10,0 148,0 138,34 0,34" fill="#1A2E24"/>
  <!-- SLATE wordmark in white -->
  <text x="18" y="24"
    font-family="'Arial Black','Arial Bold',Arial,Helvetica,sans-serif"
    font-size="18" font-weight="900"
    fill="#ffffff"
    letter-spacing="2">SLATE</text>
</svg>
