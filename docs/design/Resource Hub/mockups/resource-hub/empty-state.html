<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Resource Hub — No results</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="rh-app" data-screen-label="Resource Hub — empty state">
  <header class="rh-topbar">
    <div class="rh-topbar__brand">/SLATE <span>·</span> Resource Hub</div>
    <div class="rh-topbar__build">Slate Ops v0.58.1</div>
  </header>

  <main class="rh-page">
    <div class="rh-page__head">
      <div class="rh-eyebrow">Build floor / shared</div>
      <h1 class="rh-page__title">Resource library</h1>
      <p class="rh-page__sub">Vendor docs, install guides, and Slate-authored references for the build floor.</p>
    </div>

    <nav class="rh-tabs" aria-label="Resource Hub sections">
      <button class="rh-tab" type="button" aria-current="page">Library <span class="rh-tab__count">0</span></button>
      <button class="rh-tab" type="button">Slate-authored <span class="rh-tab__count">11</span></button>
      <button class="rh-tab" type="button">Admin queue <span class="rh-tab__count">6</span></button>
      <button class="rh-tab" type="button">Recently updated <span class="rh-tab__count">8</span></button>
    </nav>

    <div class="rh-sticky">
      <label class="rh-search">
        <svg class="rh-search__icon" viewBox="0 0 16 16" aria-hidden="true"><circle cx="7" cy="7" r="5" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="11" y1="11" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <input class="rh-search__input" type="search" value="awning bracket" />
        <span class="rh-search__kbd">⌘K</span>
      </label>
      <div class="rh-chips" role="toolbar" aria-label="Filters">
        <button class="rh-chip" type="button" aria-pressed="true">Vendor · Flatline Van Co <span class="rh-chip__caret">×</span></button>
        <button class="rh-chip" type="button" aria-pressed="true">Doc type · QC checklist <span class="rh-chip__caret">×</span></button>
        <button class="rh-chip" type="button" aria-pressed="true">Chassis · Sprinter 170 HR <span class="rh-chip__caret">×</span></button>
        <button class="rh-chip" type="button" aria-pressed="false">Reviewed by Slate <span class="rh-chip__caret">▾</span></button>
      </div>
    </div>

    <section class="rh-empty" role="status">
      <div class="rh-empty__icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 22 22"><circle cx="9" cy="9" r="6.5" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="14" y1="14" x2="19" y2="19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <h2 class="rh-empty__title">No resources match these filters</h2>
      <p class="rh-empty__sub">Try a different vendor, doc type, or chassis combination — or clear filters to see the full library.</p>
      <div class="rh-row" style="margin-top:8px">
        <button class="rh-btn rh-btn--primary" type="button">Clear filters</button>
        <button class="rh-btn" type="button">Browse Slate-authored</button>
      </div>
    </section>
  </main>
</div>
<script src="mockup.js"></script>
</body>
</html>
